<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prodesk IT</title>
  <link rel="stylesheet" href="./styles/tailwind.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition duration-300">
  <header>
    <nav class="glass-nav fixed top-0 left-0 z-50 w-full shadow-md transition-all duration-300"
      aria-label="Primary navigation">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <a href="#" class="flex items-center gap-2.5 group">
          <span
            class="flex h-10 w-10 items-center justify-center rounded-lg bg-blue-100 text-primary shadow-md group-hover:shadow-lg transition-shadow dark:bg-gradient-to-br dark:from-primary dark:to-indigo-600 dark:text-white">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 18l6-6-6-6M8 6L2 12l6 6" />
            </svg>
          </span>
          <span
            class="text-xl font-bold text-primary dark:bg-gradient-to-r dark:from-primary dark:to-indigo-400 dark:bg-clip-text dark:text-transparent">Prodesk
            IT
          </span>
        </a>
        <div class="hidden items-center space-x-8 md:flex">
          <a href="#" class="group relative text-gray-800 dark:text-gray-200">
            Home
            <span class="absolute left-0 -bottom-1 h-[2px] w-0 bg-primary transition-all group-hover:w-full"></span>
          </a>
          <a href="#" class="group relative text-gray-800 dark:text-gray-200">
            About
            <span class="absolute left-0 -bottom-1 h-[2px] w-0 bg-primary transition-all group-hover:w-full"></span>
          </a>
          <a href="#" class="group relative text-gray-800 dark:text-gray-200">
            Services
            <span class="absolute left-0 -bottom-1 h-[2px] w-0 bg-primary transition-all group-hover:w-full"></span>
          </a>
          <a href="#" class="group relative text-gray-800 dark:text-gray-200">
            Contact
            <span class="absolute left-0 -bottom-1 h-[2px] w-0 bg-primary transition-all group-hover:w-full"></span>
          </a>

          <button id="theme-toggle" type="button" aria-label="Toggle dark mode" class="theme-switch" data-mode="light">
            <span class="theme-icons inline-flex items-center" aria-hidden="true">
              <svg class="theme-icon theme-sun w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="currentColor" aria-hidden="true">

                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
              </svg>
            </span>
            <span class="theme-label">LIGHT</span>
          </button>
        </div>
        <div class="flex items-center space-x-3 md:hidden">
          <button id="theme-toggle-mobile" type="button" aria-label="Toggle dark mode" class="theme-switch"
            data-mode="light">
            <span class="theme-icons inline-flex items-center" aria-hidden="true">
              <svg class="theme-icon theme-sun w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="currentColor" aria-hidden="true">
                <path

                fill="currentColor" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
              </svg>
            </span>
            <span class="theme-label">LIGHT</span>
          </button>
          <button id="menu-btn" type="button" aria-controls="mobile-menu" aria-expanded="false" aria-label="Open menu"
            class="rounded px-2 py-1 text-2xl text-gray-800 transition hover:bg-gray-200/60 dark:text-gray-200 dark:hover:bg-gray-700/60">
            =
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden px-6 pb-4 md:hidden">
        <a href="#" class="block py-2 text-gray-800 dark:text-gray-200">Home</a>
        <a href="#" class="block py-2 text-gray-800 dark:text-gray-200">About</a>
        <a href="#" class="block py-2 text-gray-800 dark:text-gray-200">Services</a>

  <div id="main"></div>
  <div id="footer"></div>

  <script src="script.js"></script>
</body>

</html>
